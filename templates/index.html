<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Currency House Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card">
        <h2>🏡 House Price Predictor</h2>
        <p class="subtitle">Enter property details and choose currency</p>
        
        <form method="POST" action="/">
            <div class="input-group">
                <label>Size (Square Feet)</label>
                <input type="number" name="sqft" placeholder="e.g. 1800" required min="500">
            </div>
            
            <div class="input-group">
                <label>Bedrooms</label>
                <input type="number" name="bedrooms" placeholder="e.g. 3" required min="1">
            </div>
            
            <div class="input-group">
                <label>Bathrooms</label>
                <input type="number" name="bathrooms" placeholder="e.g. 2" required min="1">
            </div>

            <div class="input-group">
                <label>Preferred Currency</label>
                <select name="currency" required>
                    <option value="USD">USD ($) - US Dollar</option>
                    <option value="INR">INR (₹) - Indian Rupee</option>
                    <option value="EUR">EUR (€) - Euro</option>
                    <option value="GBP">GBP (£) - British Pound</option>
                    <option value="CAD">CAD (CA$) - Canadian Dollar</option>
                    <option value="AUD">AUD (A$) - Australian Dollar</option>
                    <option value="JPY">JPY (¥) - Japanese Yen</option>
                </select>
            </div>
            
            <button type="submit">Calculate Value</button>
        </form>

        {% if prediction %}
            <div class="result-box">
                <h3>Estimated Market Value:</h3>
                <p class="price">{{ prediction }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
